<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GistWire News</title>
    <style>
      #initial-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; font-family: sans-serif; flex-direction: column; gap: 16px;
      }
      .loader-spinner {
        width: 32px; height: 32px; border: 3px solid #f3f3f3; border-top: 3px solid #00a85a; border-radius: 50%; animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23B30000' rx='20'/%3E%3Ctext x='50' y='65' font-family='sans-serif' font-size='48' font-weight='800' fill='white' text-anchor='middle'%3EGW%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
